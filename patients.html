<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, patient-scalable=no">
    <title>Patients | Stackly</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== GLOBAL STYLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            min-height: 100vh; 
            overflow-x: hidden;
            overflow-y: auto;
    background: linear-gradient(135deg,#eef7ff,#d8ecff,#f8fcff);
    color: #222; 
}

        /* ===== HEADER ===== */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: 70px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; background: #fff;
box-shadow: 0 4px 15px rgba(0,0,0,.06); border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
            z-index: 2000; 
        }
        .header-left { display: flex; align-items: center; min-width: 0; }
        .logo img { height: 32px; flex-shrink: 0; }
        .hamburger { display: none; font-size: 20px; cursor: pointer; color: #fff; margin-right: 15px; flex-shrink: 0; }

        .profile { display: flex; gap: 15px; align-items: center; min-width: 0; }
        .profile-name{ color:#222; }
.profile-email{ color:#666; }
.bell{ color:#222; }

        /* Matched Bell Style to Dashboard */
        .bell { position: relative; font-size: 18px; cursor: pointer; flex-shrink: 0; transition: 0.3s; }
        .bell span {
            position: absolute; top: -5px; right: -5px;
            background: #1E88E5; color: #fff; font-size: 9px;
            padding: 2px 5px; border-radius: 50%;
        }

        .profile-info { display: flex; flex-direction: column; min-width: 0; }
        .profile-name { font-weight: 600; font-size: 13px; white-space: nowrap; text-transform: capitalize; }
        .profile-email { font-size: 11px; color: #aaa; white-space: nowrap; }

        /* ===== SIDEBAR ===== */
        .sidebar { 
            width: 250px; background: #fff;
border-right:1px solid #eee; border-right: 1px solid rgba(255,255,255,0.08); 
            position: fixed; top: 70px; left: 0; height: calc(100vh - 70px); 
            padding: 20px 15px; transition: transform 0.3s ease; z-index: 1500; 
            display: flex; flex-direction: column; 
        }
        .sidebar-content {
    overflow-y: auto;
}
        .sidebar a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 10px; color: #555; text-decoration: none; font-size: 14px; margin-bottom: 5px; transition: 0.2s; }

.sidebar a:hover{
background:#E3F2FD;
color:#1E88E5;
}

.sidebar a.active{
background:#1E88E5;
color:#fff;
}
.sidebar .logout {
    color:#ff4d4d;
    border:1px solid rgba(255,77,77,0.1);
    cursor:pointer;
    margin-top:10px;
    display:flex;
    align-items:center;
    gap:12px;
}

.sidebar a.logout:hover{
    background:#FFE5E5;
    color:#E53935;
    border-color:#E53935;
}

.sidebar a.logout:hover i,
.sidebar a.logout:hover span{
    color:#E53935;
}

        /* ===== MAIN CONTENT ===== */
        .main { margin-left: 250px; padding: 100px 30px 40px; transition: 0.3s; max-width: 100%; }
        
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .card {
background:#fff;
border:1px solid #eee;
box-shadow:0 10px 30px rgba(0,0,0,.06);
}
        .card:hover{
border-color:#1E88E5;
transform:translateY(-6px);
background:#fff;
box-shadow:0 15px 40px rgba(43,185,243,0.18);
}
        .card i { color: #1E88E5; font-size: 18px; margin-bottom: 10px; }
        .card h2 { font-size: 24px; font-weight: 800; }
        .card p { font-size: 12px; color: #aaa; }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .add-btn { background: #1E88E5; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }

        .table-container { border-radius: 15px; overflow-x: auto; padding: 20px; margin-bottom: 40px; }
        .table-container {
background:#fff;
border:1px solid #eee;
box-shadow:0 10px 30px rgba(0,0,0,.06);
}
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 15px; color: #555; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .status { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .action-btn { background: none; border: none; color: #aaa; cursor: pointer; margin-right: 12px; font-size: 16px; transition: 0.2s; }
        .action-btn:hover { color: #1E88E5; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1400; }
        .overlay.active { opacity: 1; visibility: visible; }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main { margin-left: 0; padding: 90px 20px; }
            .profile-info { display: none; }
            .cards { grid-template-columns: 1fr 1fr; }
        }

        /* Moves the X to the LEFT side of the sidebar */
.mobile-close { 
    display: none; 
    justify-content: flex-start; /* Changed from flex-end to move X to the left */
    padding: 15px 20px; 
    cursor: pointer; 
    width: 100%;
}

/* Ensures the hamburger is visible and orange on mobile */
.hamburger { 
    display: none; 
    font-size: 24px; 
    cursor: pointer; 
    color: #1E88E5 !important; 
    margin-right: 15px; 
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
}

/* Fix for the password eye overlap from your screenshot */
input[type="password"] {
    padding-right: 45px !important; 
}

@media (max-width: 768px) {
    .hamburger { display: flex; }
    .mobile-close { display: flex; }
    
    .sidebar { 
        transform: translateX(-100%); 
        z-index: 2500; 
        top: 0; 
        height: 100vh;
    }
}

/* PREMIUM DASHBOARD HOVER EFFECTS */

.add-btn{
    transition:all .3s ease;
}

.add-btn:hover{
    background:#1565C0;
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(43,185,243,.30);
}

.table-container{
    transition:all .3s ease;
}

.table-container:hover{
    box-shadow:0 20px 45px rgba(43,185,243,.18);
}

.panel,
.card{
    transition:all .3s ease;
}

.card:hover{
    transform:translateY(-8px);
}

.action-btn{
    transition:all .3s ease;
}

.action-btn:hover{
    transform:scale(1.15);
}

.sidebar a{
    transition:all .3s ease;
}

.bell{
    transition:all .3s ease;
}

.bell:hover{
    transform:scale(1.1);
}

.fa-circle-patient{
    transition:all .3s ease;
}

.fa-circle-patient:hover{
    transform:scale(1.1);
    color:#1E88E5;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 24px;

    background:#fff;
    border-bottom:1px solid #eee;
    box-shadow:0 4px 15px rgba(0,0,0,.06);

    z-index:3000;
}

.header-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo img{
    height:32px;
    display:block;
}

.hamburger{
    display:none;

    width:40px;
    height:40px;

    border:none;
    background:none;

    cursor:pointer;

    font-size:24px;
    color:#1E88E5;

    align-items:center;
    justify-content:center;
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile-icon{
    font-size:22px;
    cursor:pointer;
    color:#222;
}

.profile-info{
    display:flex;
    flex-direction:column;
    line-height:1.2;
}

.profile-name{
    font-size:13px;
    font-weight:600;
    color:#222;
}

.profile-email{
    font-size:11px;
    color:#777;
}

.bell{
    position:relative;
    font-size:18px;
    cursor:pointer;
    color:#222;
}

.bell span{
    position:absolute;
    top:-5px;
    right:-6px;

    width:16px;
    height:16px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:50%;

    font-size:9px;

    background:#1E88E5;
    color:#fff;
}

@media (max-width:768px){

    header{
        padding:0 15px;
    }

    .hamburger{
        display:flex;
    }

    .header-left{
        gap:10px;
    }

    .logo img{
        height:30px;
    }

    .profile{
        gap:10px;
    }

    .profile-icon{
        display:none;
    }

    .profile-info{
        display:none;
    }

}


@media(max-width:768px){

    .sidebar{
        transform:translateX(-100%);
        top:0;
        height:100vh;
        z-index:2500;
    }

    .sidebar.active{
        transform:translateX(0);
    }

    .main{
        margin-left:0;
        padding:90px 20px;
    }

    .mobile-close{
        display:flex;
    }

}

    </style>
</head>
<body>

<header>

    <div class="header-left">

        <button class="hamburger" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="logo">
            <img src="assets/images/logo/stackly_logo.webp" alt="Stackly">
        </div>

    </div>

    <div class="profile">

        <div class="bell" onclick="go404()">
            <i class="fa-regular fa-bell"></i>
            <span>3</span>
        </div>

        <i class="fa-regular fa-circle-patient profile-icon"
           onclick="go404()"></i>

        <div class="profile-info">

            <span class="profile-name" id="profileName">
                Doctor
            </span>

            <span class="profile-email" id="profileEmail">
            </span>

        </div>

    </div>

</header>

<div class="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="mobile-close" onclick="toggleSidebar()">
        <i class="fa-solid fa-xmark" style="font-size: 28px; color: #1E88E5;"></i>
    </div>
    
    <div class="sidebar-content">
        <h3 style="font-size: 11px; color: #555; margin: 10px 15px; letter-spacing: 1px;">MAIN</h3>
        <a href="doctor_dashboard.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
        
        <h3 style="font-size: 11px; color: #555; margin: 25px 15px 10px; letter-spacing: 1px;">MANAGEMENT</h3>
        <a href="patients.html" class="active"><i class="fa-solid fa-hospital-user"></i><span>Patients</span></a>
        <a href="ratings.html"><i class="fa-solid fa-notes-medical"></i><span>Ratings</span></a>
        
        <h3 style="font-size: 11px; color: #555; margin: 25px 15px 10px; letter-spacing: 1px;">SYSTEM</h3>
        <a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    </div>
    
    <a onclick="logoutPatient()" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
    </a>
</aside>

<main class="main">
    <div class="table-header">
        <h1 style="font-size: 28px; font-weight: 800;">Manage Patients</h1>
        <button class="add-btn" onclick="window.location.href='dt_404.html'">+ Add New Patient</button>
    </div>

    <div class="cards">
<div class="card"><i class="fa-solid fa-hospital-user"></i><p>Patients</p><h2>+540</h2></div>
<div class="card"><i class="fa-solid fa-hospital"></i><p>Departments</p><h2>+320</h2></div>
<div class="card"><i class="fa-solid fa-notes-medical"></i><p>Appointments</p><h2>+860</h2></div>
<div class="card"><i class="fa-solid fa-calendar-check"></i><p>Medical Reports</p><h2>+1.2K</h2></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
<th>Patient Name</th>
<th>Email</th>
<th>Treatment</th>
<th>Status</th>
<th>Actions</th>
                </tr>
            </thead>
            <tbody id="patientTableBody"></tbody>
        </table>
    </div>
</main>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.querySelector(".overlay").classList.toggle("active");
    }

    function logoutPatient() {
        localStorage.clear();
        window.location.href = "login.html";
    }

const patients = [
{ name: "John Doe", email: "john@gmail.com", service: "General Consultation" },
{ name: "Sarah Lee", email: "sarah@gmail.com", service: "Cardiology Consultation" },
{ name: "David Smith", email: "david@gmail.com", service: "Emergency Care" }
];
    window.onload = function() {
        const tableBody = document.getElementById("patientTableBody");
        patients.forEach(patient => {
            const row = `
                <tr>
                    <td>${patient.name}</td>
                    <td>${patient.email}</td>
                    <td>${patient.service}</td>
                    <td><span class="status">Active</span></td>
                    <td>
                        <button class="action-btn" onclick="window.location.href='dt_404.html'"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="action-btn" onclick="window.location.href='dt_404.html'"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        const storedData = localStorage.getItem("patientData");
        if (storedData) {
            const patient = JSON.parse(storedData);
            document.getElementById("profileName").textContent = patient.role || "Doctor";
            document.getElementById("profileEmail").textContent = patient.email || "doctor@stacklyhospital.com";
        }
    };

    const storedData =
localStorage.getItem("patientData");

if(storedData){

    const patient =
    JSON.parse(storedData);

    document.getElementById("profileName").textContent =
        patient.role || "Doctor";

    document.getElementById("profileEmail").textContent =
        patient.email || "";
}

</script>
</body>
</html>
