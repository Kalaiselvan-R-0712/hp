<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}

body{
background:linear-gradient(135deg,#eef7ff,#d8ecff,#f8fcff);
color:#222;
overflow-x:hidden;
min-height:100vh;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
background:#fff;
box-shadow:0 4px 15px rgba(0,0,0,.06);
z-index:3000;
}

.header-left{display:flex;align-items:center;}
.logo img{height:32px;}

.profile{display:flex;gap:15px;align-items:center;}
.profile i{color:#222;}

/* SIDEBAR */
.sidebar{
width:250px;
background:#fff;
border-right:1px solid #eee;
position:fixed;
top:70px;
height:calc(100% - 70px);
padding:20px;
display:flex;
flex-direction:column;
z-index:2500;
transition:0.3s;
}

.sidebar a{
display:flex;
gap:12px;
padding:12px;
border-radius:10px;
color:#555;
text-decoration:none;
margin-bottom:5px;
align-items:center;
transition:0.2s;
}

.sidebar a:hover{
background:#E3F2FD;
color:#1E88E5;
}

.sidebar a.active{
background:#1E88E5;
color:#fff;
}

/* MAIN */
.main{
margin-left:250px;
padding:100px 30px;
}

/* PANEL */
.panel{
background:#fff;
padding:25px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.panel h3{
margin-bottom:15px;
}

/* INPUT */
.input{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:8px;
outline:none;
}

/* BUTTON */
.btn{
background:#1E88E5;
border:none;
padding:12px 20px;
border-radius:8px;
color:#fff;
margin-top:10px;
cursor:pointer;
font-weight:600;
}

/* HAMBURGER */
.hamburger{
display:none;
font-size:24px;
cursor:pointer;
color:#1E88E5;
margin-right:15px;
}

/* MOBILE */
@media(max-width:768px){

.hamburger{display:flex;}

.sidebar{
transform:translateX(-100%);
top:70px;
height:calc(100% - 70px);
width:280px;
}

.sidebar.active{
transform:translateX(0);
}

.main{
margin-left:0;
padding:90px 20px;
}

.overlay{
top:70px;
height:calc(100% - 70px);
position:fixed;
left:0;
width:100%;
background:rgba(0,0,0,0.3);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:2000;
}

.overlay.active{
opacity:1;
visibility:visible;
}
}

/* PREMIUM INSURANCE SETTINGS HOVERS */

.btn{
    transition:all .3s ease;
}

.btn:hover{
    background:#1565C0;
    transform:translateY(-4px);
    box-shadow:0 12px 25px rgba(43,185,243,.30);
}

.panel{
    transition:all .3s ease;
}

.panel:hover{
    transform:translateY(-4px);
    box-shadow:0 20px 45px rgba(43,185,243,.12);
}

.input{
    transition:all .3s ease;
}

.input:focus{
    border-color:#1E88E5;
    box-shadow:0 0 0 4px rgba(43,185,243,.12);
}

.fa-bell,
.fa-circle-patient{
    transition:all .3s ease;
}

.fa-bell:hover,
.fa-circle-patient:hover{
    transform:scale(1.1);
    color:#1E88E5;
}

.sidebar a{
    transition:all .3s ease;
}

.sidebar .logout{
    color:#ff4d4d;
    border:1px solid rgba(255,77,77,0.2);
    background:rgba(255,77,77,0.03);
    margin-top:10px;
    cursor:pointer;
    padding:12px;
    border-radius:10px;
    display:flex;
    gap:12px;
    align-items:center;
    text-decoration:none;
    transition:all .3s ease;
}

.sidebar .logout:hover{
    background:rgba(255,77,77,0.12);
    color:#ff3b3b;
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(255,77,77,.25);
}

@media (max-width: 768px) {
    .mobile-hide {
        display: none !important;
    }
}

@media (max-width:768px){

    #profileName{
        font-size:14px;
        font-weight:600;
    }

    #profileEmail{
        font-size:10px;
        color:#999;
        max-width:130px;
        overflow-wrap:anywhere;
    }

}

header {
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    background:#fff;
    box-shadow:0 4px 15px rgba(0,0,0,.06);
    border-bottom:1px solid rgba(255,255,255,0.08);
    z-index:3000;
}

.header-left{
    display:flex;
    align-items:center;
}

.logo img{
    height:32px;
}

.profile{
    display:flex;
    gap:15px;
    align-items:center;
}

.profile i{
    color:#222;
}

@media(max-width:768px){

    .hamburger{
        display:flex;
    }

    .sidebar{
        transform:translateX(-100%);
        background:#fff;
        top:70px;
        height:calc(100% - 70px);
        width:280px;
    }

    .sidebar.active{
        transform:translateX(0);
    }

    .main{
        margin-left:0;
        padding:90px 20px;
    }

    .overlay{
        top:70px;
        height:calc(100% - 70px);
        position:fixed;
        left:0;
        width:100%;
        background:rgba(0,0,0,0.3);
        opacity:0;
        visibility:hidden;
        transition:0.3s;
        z-index:2000;
    }

    .overlay.active{
        opacity:1;
        visibility:visible;
    }
}

@media (max-width:768px){

    #profileName{
        font-size:14px;
        font-weight:600;
    }

    #profileEmail{
        font-size:10px;
        color:#999;
        max-width:130px;
        overflow-wrap:anywhere;
    }
}

</style>
</head>

<body>

<header>
    <div class="header-left">
        <div class="hamburger" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="logo">
            <img src="assets/images/logo/stackly_logo.webp" alt="Stackly">
        </div>
    </div>

    <div class="profile">
        <i class="fa-regular fa-bell mobile-hide" onclick="go404()" style="cursor:pointer;font-size:18px;"></i>

        <i class="fa-regular fa-circle-patient mobile-hide"
           onclick="go404()"
           style="font-size:22px;cursor:pointer;"></i>

        <div>
            <div id="profileName" style="font-weight:600;font-size:14px;">Patient</div>
            <div id="profileEmail" style="font-size:11px;color:#555;">patient@mail.com</div>
        </div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">

<a href="patient_dashboard.html"><i class="fa-solid fa-house"></i>Dashboard</a>
<a href="watchlist.html"><i class="fa-solid fa-calendar-check"></i>My Appointments</a>
<a href="my_ratings.html"><i class="fa-solid fa-notes-medical"></i>Medical Reports</a>
<a href="pt_settings.html" class="active"><i class="fa-solid fa-gear"></i>Settings</a>

<div class="logout" onclick="logoutPatient()">
<i class="fa-solid fa-right-from-bracket"></i>Logout
</div>

</aside>

<main class="main">

<h1 style="margin-bottom:25px;font-weight:800;">Settings ⚙️</h1>

<!-- PROFILE -->
<div class="panel">
<h3>Profile Settings</h3>

<input class="input" placeholder="Full Name">
<input class="input" placeholder="Email Address">

<button class="btn" onclick="go404()">Update Profile</button>
</div>

<!-- PASSWORD -->
<div class="panel">
<h3>Password</h3>

<input class="input" type="password" placeholder="New Password">

<button class="btn" onclick="go404()">Change Password</button>
</div>

<!-- PREFERENCES -->
<div class="panel">
<h3>Preferences</h3>

<p>Theme: Light Mode ☀️</p>
<p>Notifications: Enabled 🔔</p>

<button class="btn" onclick="go404()">Manage Preferences</button>
</div>

</main>

<script>
function toggleSidebar(){
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

sidebar.classList.toggle("active");
overlay.classList.toggle("active");
}

function go404(){ window.location.href="pt_404.html"; }

function logoutPatient(){
localStorage.clear();
window.location.href="login.html";
}

const storedData = localStorage.getItem("patientData");
if(storedData){
const patient = JSON.parse(storedData);
document.getElementById("profileName").textContent = patient.role || "Patient";
document.getElementById("profileEmail").textContent = patient.email;
}
</script>

</body>
</html>
